<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Fault Report Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="main-menu">
    <div class="menu-app-title">Jira Stat Dashboard</div>
    <a href="/" class="menu-item {% if active_page == 'dashboard' %}active{% endif %}">Fault reports</a>
    <a href="/pi-planning" class="menu-item {% if active_page == 'pi-planning' %}active{% endif %}">PI Planning</a>
    <a href="/backlog" class="menu-item {% if active_page == 'backlog' %}active{% endif %}">Backlog</a>
    <a href="/roadmap" class="menu-item {% if active_page == 'roadmap' %}active{% endif %}">Road map</a>
    <a href="/project-fault-reports" class="menu-item {% if active_page == 'project-fr' %}active{% endif %}">Project Fault reports</a>
    <a href="/team-capacity" class="menu-item menu-item-settings {% if active_page == 'team-capacity' %}active{% endif %}">Team Capacity</a>
    <a href="/settings" class="menu-item {% if active_page == 'settings' %}active{% endif %}">Settings</a>
    <div class="menu-global-controls">
      <select id="workGroupSelect" class="menu-global-select" aria-label="Leading Work Group"></select>
      <select id="fixVersionSelect" class="menu-global-select" aria-label="Fix Version"></select>
    </div>
  </nav>

  <div class="filters">
    <button id="refresh">Refresh Data</button>

    <button id="download-excel" style="margin-left: 10px; padding: 10px 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">
      📥 Export to Excel
    </button>
  </div>

  <div class="dashboard-container">
    <div class="chart-section">
      <canvas id="statsChart"></canvas>
    </div>

    <div class="table-section">
      <table id="issueTable">
        <thead>
          <tr>
            <th class="one-line-cell">Jira ID</th>
            <th>Summary</th>
            <th>Status</th>
            <th class="hide-labels">Labels</th>
            <th id="sortClasses" style="cursor: pointer;">Classes ▲</th>
            <th class="one-line-cell">Delegated to</th>
            <th>Feature Name</th>
          </tr>
        </thead>
        <tbody>
          <!-- JS populates rows -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>
    document.getElementById("download-excel").addEventListener("click", function () {
      const fx = document.getElementById("fixVersionSelect")?.value || "PI_25w10";
      const wg = document.getElementById("workGroupSelect")?.value || "ART - BCRC - BSW TFW";
      window.location.href = `/export_excel?fixVersion=${encodeURIComponent(fx)}&workGroup=${encodeURIComponent(wg)}`;
    });
  </script>
  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
