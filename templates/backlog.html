<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Backlog</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- Loading overlay -->
  <div id="loading-overlay" style="
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(255,255,255,0.7);
    z-index: 99999;
    justify-content: center;
    align-items: center;
  ">
    <div style="
      background: #fff;
      border: 2px solid #007bff;
      border-radius: 14px;
      padding: 24px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      font-size: 1.4em;
      color: #007bff;
      display: flex;
      align-items: center;
      gap: 15px;
    ">
      <span class="loading-spinner" style="
        width: 28px; height: 28px; border: 3px solid #cce0ff; border-top: 3px solid #007bff;
        border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; margin-right: 15px;">
      </span>
      Loading data...
    </div>
  </div>

  <nav class="main-menu">
    <a href="/" class="menu-logo-link" aria-label="Home">
      <img src="/static/logo.png" alt="Logo" class="menu-logo-img" />
    </a>
    <a href="/" class="menu-item">Fault reports</a>
    <a href="/pi-planning" class="menu-item">PI Planning</a>
    <a href="/backlog" class="menu-item active">Backlog</a>
    <a href="/roadmap" class="menu-item">Road map</a>
    <a href="/project-fault-reports" class="menu-item">Project Fault reports</a>
    <a href="/team-capacity" class="menu-item menu-item-settings">Team Capacity</a>
    <a href="/settings" class="menu-item">Settings</a>
    <div class="menu-global-controls">
      <select id="workGroupSelect" class="menu-global-select" aria-label="Leading Work Group"></select>
    </div>
  </nav>

  <div class="filters">
    <label for="globalFilter">Filter:</label>
    <input type="text" id="globalFilter" placeholder="Search table..." />

    <label>Status:</label>
    <div class="backlog-status-dropdown">
      <button id="statusFilterToggle" type="button" class="backlog-status-toggle">Statuses</button>
      <div id="statusFilterMenu" class="backlog-status-menu" aria-label="Status filter"></div>
    </div>

    <div class="page-action-group">
      <button id="export-backlog-excel" class="page-export-btn">📥 Export Backlog to Excel</button>
      <button id="backlog-refresh" class="page-refresh-btn">🔄 Update from Jira</button>
    </div>
  </div>

  <!-- Column toggler bar for backlog table -->
  <div id="backlog-column-toggles" class="column-toggles"></div>
  <div id="backlog-table" class="collapsible-section"></div>

  <script src="/static/script.js"></script>

  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
