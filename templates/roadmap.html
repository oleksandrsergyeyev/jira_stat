<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Road map</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="loading-overlay" style="
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(255,255,255,0.7);
    z-index: 99999;
    justify-content: center;
    align-items: center;
  ">
    <div style="
      background: #fff;
      border: 2px solid #007bff;
      border-radius: 14px;
      padding: 24px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      font-size: 1.4em;
      color: #007bff;
      display: flex;
      align-items: center;
      gap: 15px;
    ">
      <span class="loading-spinner" style="
        width: 28px; height: 28px; border: 3px solid #cce0ff; border-top: 3px solid #007bff;
        border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; margin-right: 15px;">
      </span>
      Loading data...
    </div>
  </div>

  <nav class="main-menu">
    <div class="menu-app-title">Jira Stat Dashboard</div>
    <a href="/" class="menu-item">Fault reports</a>
    <a href="/pi-planning" class="menu-item">PI Planning</a>
    <a href="/backlog" class="menu-item">Backlog</a>
    <a href="/roadmap" class="menu-item active">Road map</a>
    <a href="/project-fault-reports" class="menu-item">Project Fault reports</a>
    <a href="/team-capacity" class="menu-item menu-item-settings">Team Capacity</a>
    <a href="/settings" class="menu-item">Settings</a>
  </nav>

  <div class="filters">
    <label for="workGroupSelect">Leading Work Group:</label>
    <select id="workGroupSelect"></select>

    <button id="roadmap-refresh"
      style="margin-left: 10px; padding: 10px 16px; background-color: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">
      🔄 Update from Jira
    </button>

    <span id="capabilities-count" class="roadmap-counter">Capabilities: 0</span>

    <div class="roadmap-priority-legend" aria-label="Feature priority color legend">
      <span class="roadmap-priority-legend-title">Priority</span>
      <span class="roadmap-priority-legend-min">1</span>
      <span class="roadmap-priority-legend-scale" title="1 = red, 10 = blue"></span>
      <span class="roadmap-priority-legend-max">10</span>
    </div>
  </div>

  <section class="roadmap-section">
    <div id="backlog-roadmap" class="backlog-roadmap"></div>
  </section>

  <div id="roadmap-floating-actions" class="roadmap-floating-actions hidden">
    <span id="roadmap-pending-count" class="roadmap-counter roadmap-counter-pending">Pending changes: 0</span>
    <button id="roadmap-push-jira" class="roadmap-push-btn" type="button">⬆ Push to Jira</button>
  </div>

  <div id="roadmap-context-menu" class="roadmap-context-menu hidden"></div>
  <div id="roadmap-feature-modal" class="roadmap-feature-modal hidden">
    <div class="roadmap-feature-modal-card">
      <div class="roadmap-feature-modal-head">
        <span id="roadmap-feature-modal-title">Feature info</span>
        <button id="roadmap-feature-modal-close" type="button" class="roadmap-feature-modal-close">×</button>
      </div>
      <div id="roadmap-feature-modal-body" class="roadmap-feature-modal-body"></div>
    </div>
  </div>

  <script src="/static/script.js"></script>
  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
