<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Project Fault Reports</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/project_fault_reports.css" />
</head>
<body class="project-fr-page">
  <nav class="main-menu">
    <a href="/" class="menu-item">Fault reports</a>
    <a href="/pi-planning" class="menu-item">PI Planning</a>
    <a href="/backlog" class="menu-item">Backlog</a>
    <a href="/roadmap" class="menu-item">Road map</a>
    <a href="/project-fault-reports" class="menu-item active">Project Fault reports</a>
  </nav>

  <h1>Project Fault Reports</h1>

  <div class="filters">
    <div class="filter-row keyword-row">
      <div class="keyword-col">
        <label for="keywordsInput">Keywords (comma / newline separated):</label>
        <input id="keywordsInput" type="text" placeholder="e.g. boot fail, diag timeout" />
      </div>
      <div class="keyword-col">
        <label for="jiraIdFilterInput">Jira ID filter (prefix, comma / newline separated):</label>
        <input id="jiraIdFilterInput" type="text" placeholder="e.g. ARTBCRC, ARTSAF" />
      </div>
      <button id="search-btn" class="primary-btn">Search</button>
      <button id="project-fr-refresh" class="primary-btn">Update from Jira</button>
    </div>
  </div>

  <div id="status-filters" class="status-filters"></div>

  <div class="table-section">
    <table id="project-fr-table" class="pi-planning-table">
      <thead>
        <tr>
          <th onclick="sortTable(this)">#</th>
          <th onclick="sortTable(this)">Jira ID</th>
          <th onclick="sortTable(this)">Summary</th>
          <th onclick="sortTable(this)">Status</th>
          <th onclick="sortTable(this)">Fix Versions</th>
          <th onclick="sortTable(this)">Labels</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/static/script.js"></script>
  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
