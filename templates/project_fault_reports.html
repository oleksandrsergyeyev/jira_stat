<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Project Fault Reports</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <nav class="main-menu">
    <a href="/" class="menu-item">Fault reports</a>
    <a href="/pi-planning" class="menu-item">PI Planning</a>
    <a href="/backlog" class="menu-item">Backlog</a>
    <a href="/project-fault-reports" class="menu-item active">Project Fault reports</a>
  </nav>

  <h1>Project Fault Reports</h1>

  <div class="filters">
    <label for="workGroupSelect">Leading Work Group (optional):</label>
    <select id="workGroupSelect">
      <option value="">All</option>
      <option value="ART - BCRC - BSW TFW">Infra Team</option>
      <option value="ART - BCRC - SysSW CI">CI Team</option>
      <option value="ART - BCRC - FPT">Web Team</option>
      <option value="ART - BCRC - BSW Diag and Com">Diag and Com</option>
      <option value="ART - BCRC - BSW HW Interface">HW interface</option>
      <option value="ART - BCRC - BSW Platform">BSW Platform</option>
      <option value="ART - BCRC - BSW SW Platform and BL">BSW SW Platform and BL</option>
      <option value="ART - BCRC - Domain">AiC team</option>
      <option value="ART - BCRC - FSW">FSW team</option>
      <option value="ART - BCRC - SysSW System Safety and Security">Safety & Security</option>
      <option value="ART - BCRC - Moni">TPMS</option>
    </select>

    <label for="keywordsInput">Keywords (comma / newline separated):</label>
    <textarea id="keywordsInput" rows="3" cols="40" placeholder="e.g. boot fail, diag timeout"></textarea>

    <label for="includeClosed">
      <input type="checkbox" id="includeClosed" /> Show Closed
    </label>

    <button id="search-btn">Search</button>
  </div>

  <div class="table-section">
    <table id="project-fr-table" class="pi-planning-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Jira ID</th>
          <th>Summary</th>
          <th>Status</th>
          <th>Fix Versions</th>
          <th>Labels</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/static/script.js"></script>
  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
