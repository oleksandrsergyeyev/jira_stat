<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Team Capacity</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <nav class="main-menu">
    <div class="menu-app-title">Jira Stat Dashboard</div>
    <a href="/" class="menu-item">Fault reports</a>
    <a href="/pi-planning" class="menu-item">PI Planning</a>
    <a href="/team-capacity" class="menu-item active">Team Capacity</a>
    <a href="/backlog" class="menu-item">Backlog</a>
    <a href="/roadmap" class="menu-item">Road map</a>
    <a href="/project-fault-reports" class="menu-item">Project Fault reports</a>
  </nav>

  <section id="team-capacity-page" class="team-capacity-page">
    <div class="filters team-capacity-filters">
      <label for="workGroupSelect">Leading Work Group:</label>
      <select id="workGroupSelect">
        <option value="ART - BCRC - BSW TFW" selected>Infra Team</option>
        <option value="ART - BCRC - SysSW CI">CI Team</option>
        <option value="ART - BCRC - FPT">Web Team</option>
        <option value="ART - BCRC - BSW Diag and Com">Diag and Com</option>
        <option value="ART - BCRC - BSW HW Interface">HW interface</option>
        <option value="ART - BCRC - BSW Platform">BSW Platform</option>
        <option value="ART - BCRC - BSW SW Platform and BL">BSW SW Platform and BL</option>
        <option value="ART - BCRC - Domain">AiC team</option>
        <option value="ART - BCRC - FSW">FSW team</option>
        <option value="ART - BCRC - SysSW System Safety and Security">Safety &amp; Security</option>
        <option value="ART - BCRC - Moni">TPMS</option>
      </select>

      <label for="fixVersionSelect">Fix Version:</label>
      <select id="fixVersionSelect">
        <option value="PI_24w49">PI_24w49</option>
        <option value="PI_25w10" selected>PI_25w10</option>
        <option value="QS_25w22">QS_25w22</option>
        <option value="QS_25w37">QS_25w37</option>
        <option value="QS_25w49">QS_25w49</option>
      </select>
    </div>

    <div class="team-capacity-search-wrap">
      <label for="team-capacity-user-search">Find Jira users:</label>
      <div class="team-capacity-search-row">
        <input id="team-capacity-user-search" type="text" placeholder="Type name or email and press Enter" />
        <button id="team-capacity-user-search-btn" class="team-capacity-btn" type="button">Search</button>
      </div>
      <div id="team-capacity-search-results" class="team-capacity-search-results"></div>
    </div>

    <div id="team-capacity-status" class="team-capacity-status info">Choose team and Fix Version to manage capacity.</div>

    <div class="team-capacity-table-wrap">
      <table class="team-capacity-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Team member</th>
            <th>Sprint 1</th>
            <th>Sprint 2</th>
            <th>Sprint 3</th>
            <th>Sprint 4</th>
            <th>Sprint 5</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="team-capacity-members-body"></tbody>
      </table>
    </div>
  </section>

  <script src="/static/script.js"></script>
  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
