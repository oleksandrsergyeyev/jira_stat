<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Team Capacity</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <nav class="main-menu">
    <a href="/" class="menu-logo-link" aria-label="Home">
      <img src="/static/logo.png" alt="Logo" class="menu-logo-img" />
    </a>
    <a href="/" class="menu-item">Fault reports</a>
    <a href="/pi-planning" class="menu-item">PI Planning</a>
    <a href="/backlog" class="menu-item">Backlog</a>
    <a href="/roadmap" class="menu-item">Road map</a>
    <a href="/project-fault-reports" class="menu-item">Project Fault reports</a>
    <a href="/team-capacity" class="menu-item menu-item-settings active">Team Capacity</a>
    <a href="/settings" class="menu-item">Settings</a>
    <div class="menu-global-controls">
      <select id="workGroupSelect" class="menu-global-select" aria-label="Leading Work Group"></select>
      <select id="fixVersionSelect" class="menu-global-select" aria-label="Fix Version"></select>
    </div>
  </nav>

  <section id="team-capacity-page" class="team-capacity-page">
    <div class="team-capacity-search-wrap">
      <label for="team-capacity-user-search">Find Jira users:</label>
      <div class="team-capacity-search-row">
        <div class="team-capacity-search-left">
          <input id="team-capacity-user-search" type="text" placeholder="Type name or email and press Enter" />
          <button id="team-capacity-user-search-btn" class="team-capacity-btn" type="button">Search</button>
        </div>
        <button id="team-capacity-copy-prev" class="team-capacity-btn secondary team-capacity-copy-right" type="button">Copy team from previous QS</button>
      </div>
      <div id="team-capacity-search-results" class="team-capacity-search-results"></div>
    </div>

    <div id="team-capacity-status" class="team-capacity-status info">Choose team and Fix Version to manage capacity.</div>

    <div class="team-capacity-start-week-wrap">
      <label for="team-capacity-first-week">First week:</label>
      <input id="team-capacity-first-week" type="week" />
      <button id="team-capacity-first-week-reset" class="team-capacity-btn secondary" type="button">Use from Fix Version</button>
    </div>

    <div class="team-capacity-table-wrap" id="team-capacity-planner-wrap">
      <div id="team-capacity-planner"></div>
    </div>
  </section>

  <script src="/static/script.js"></script>
  <div id="team-capacity-confirm-modal" class="team-capacity-confirm-modal hidden" role="dialog" aria-modal="true" aria-labelledby="team-capacity-confirm-title">
    <div class="team-capacity-confirm-card">
      <div id="team-capacity-confirm-title" class="team-capacity-confirm-title">Delete team member?</div>
      <div id="team-capacity-confirm-message" class="team-capacity-confirm-message">Are you sure you want to delete this member?</div>
      <div class="team-capacity-confirm-actions">
        <button id="team-capacity-confirm-cancel" type="button" class="team-capacity-btn secondary">Cancel</button>
        <button id="team-capacity-confirm-ok" type="button" class="team-capacity-btn danger">Delete</button>
      </div>
    </div>
  </div>
  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
