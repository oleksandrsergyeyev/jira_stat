<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PI Planning</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- Loading overlay -->
  <div id="loading-overlay" style="
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(255,255,255,0.7);
    z-index: 99999;
    justify-content: center;
    align-items: center;
  ">
    <div style="
      background: #fff;
      border: 2px solid #007bff;
      border-radius: 14px;
      padding: 24px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      font-size: 1.4em;
      color: #007bff;
      display: flex;
      align-items: center;
      gap: 15px;
    ">
      <span class="loading-spinner" style="
        width: 28px; height: 28px; border: 3px solid #cce0ff; border-top: 3px solid #007bff;
        border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; margin-right: 15px;">
      </span>
      Loading data...
    </div>
  </div>

  <nav class="main-menu">
    <a href="/" class="menu-logo-link" aria-label="Home">
      <img src="/static/logo.png" alt="Logo" class="menu-logo-img" />
    </a>
    <a href="/" class="menu-item">Fault reports</a>
    <a href="/pi-planning" class="menu-item active">PI Planning</a>
    <a href="/backlog" class="menu-item">Backlog</a>
    <a href="/roadmap" class="menu-item">Road map</a>
    <a href="/project-fault-reports" class="menu-item">Project Fault reports</a>
    <a href="/team-capacity" class="menu-item menu-item-settings">Team Capacity</a>
    <a href="/settings" class="menu-item">Settings</a>
    <div class="menu-global-controls">
      <select id="workGroupSelect" class="menu-global-select" aria-label="Leading Work Group"></select>
      <select id="fixVersionSelect" class="menu-global-select" aria-label="Fix Version"></select>
    </div>
  </nav>

  <div class="filters">
    <label for="globalFilter">Filter:</label>
    <input type="text" id="globalFilter" placeholder="Search table..." />
    <button id="planning-reset-column-filters" type="button" class="page-refresh-btn">Reset column filters</button>

    <div class="page-action-group">
      <button id="export-committed-excel" class="page-export-btn">📥 Export Committed to Excel</button>
      <button id="planning-refresh" class="page-refresh-btn">🔄 Update from Jira</button>
    </div>
  </div>

  <!-- Capacity summary on top -->
  <div id="committed-summary"></div>

  <div class="section-header">
    <h2 class="pi-section-title">Committed Features</h2>
    <div>
      <button type="button" class="pi-load-tree-btn" id="pi-collapse-all-stories">Collapse all stories</button>
      <button class="collapse-btn" onclick="toggleTable('committed-table', this)">⬆ Collapse</button>
    </div>
  </div>
  <!-- Column toggler bar for committed table -->
  <div id="committed-column-toggles" class="column-toggles"></div>
  <div id="committed-table" class="collapsible-section"></div>

  <!-- ===== Feature Sprint Timeline (Gantt) ===== -->
  <div class="section-header">
    <h2 class="pi-section-title">Feature Sprint Timeline (Gantt)</h2>
    <div>
      <button class="collapse-btn" onclick="toggleTable('gantt-wrapper', this)">⬆ Collapse</button>
    </div>
  </div>

  <div id="gantt-wrapper" class="gantt-wrapper">
    <div id="gantt-container"></div>
  </div>

  <script src="/static/script.js"></script>

  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
