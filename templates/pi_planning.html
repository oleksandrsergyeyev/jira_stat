<!DOCTYPE html>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PI Planning</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <!-- Loading overlay -->
  <div id="loading-overlay" style="
    display: none;
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    background: rgba(255,255,255,0.7);
    z-index: 99999;
    justify-content: center;
    align-items: center;
  ">
    <div style="
      background: #fff;
      border: 2px solid #007bff;
      border-radius: 14px;
      padding: 24px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      font-size: 1.4em;
      color: #007bff;
      display: flex;
      align-items: center;
      gap: 15px;
    ">
      <span class="loading-spinner" style="
        width: 28px; height: 28px; border: 3px solid #cce0ff; border-top: 3px solid #007bff;
        border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; margin-right: 15px;">
      </span>
      Loading data...
    </div>
  </div>

  <nav class="main-menu">
    <a href="/" class="menu-logo-link" aria-label="Home">
      <img src="/static/logo.png" alt="Logo" class="menu-logo-img" />
    </a>
    <a href="/" class="menu-item">Fault reports</a>
    <a href="/pi-planning" class="menu-item active">PI Planning</a>
    <a href="/backlog" class="menu-item">Backlog</a>
    <a href="/roadmap" class="menu-item">Road map</a>
    <a href="/project-fault-reports" class="menu-item">Project Fault reports</a>
    <a href="/team-capacity" class="menu-item menu-item-settings">Team Capacity</a>
    <a href="/settings" class="menu-item">Settings</a>
    <div class="menu-global-controls">
      <select id="workGroupSelect" class="menu-global-select" aria-label="Leading Work Group"></select>
      <select id="fixVersionSelect" class="menu-global-select" aria-label="Fix Version"></select>
    </div>
  </nav>

  <div class="filters">
    <label for="globalFilter">Filter:</label>
    <input type="text" id="globalFilter" placeholder="Search table..." />
    <button id="planning-reset-column-filters" type="button" class="page-refresh-btn">Reset column filters</button>

    <div class="backlog-status-dropdown">
      <button id="planningFilterToggle" type="button" class="backlog-status-toggle">Filters / order</button>
      <div id="planningFilterMenu" class="backlog-status-menu" aria-label="PI planning filters and ordering">
        <div class="backlog-menu-level1">
          <button type="button" class="backlog-menu-level1-item" data-submenu-target="order">Order ▸</button>
        </div>

        <div id="planningSubmenuOrder" class="backlog-submenu-panel">
          <label class="backlog-status-option">
            <input type="checkbox" id="planning-order-priority" />
            <span>Order features by priority</span>
          </label>
        </div>
      </div>
    </div>

    <div class="page-action-group">
      <button id="export-committed-excel" class="page-export-btn">📥 Export Committed to Excel</button>
      <button id="planning-refresh" class="page-refresh-btn">🔄 Update from Jira</button>
    </div>
  </div>

  <!-- Capacity summary on top -->
  <div id="committed-summary"></div>

  <div class="section-header">
    <h2 class="pi-section-title">Committed Features <button class="collapse-btn pi-inline-collapse-btn" onclick="toggleTable('committed-table', this)">⬆ Collapse</button><span class="backlog-status-dropdown pi-inline-columns-dropdown"><button id="planningColumnsToggle" type="button" class="collapse-btn pi-inline-collapse-btn pi-inline-columns-btn">Columns hide/show</button><div id="planningColumnsMenu" class="backlog-status-menu pi-inline-columns-menu"><div id="planningColumnsSection" class="backlog-column-toggle-section"><div class="backlog-column-toggle-title">Columns hide/show</div></div></div></span><button type="button" class="pi-load-tree-btn" id="pi-collapse-all-stories">Collapse all stories</button></h2>
  </div>
  <!-- Column toggler bar for committed table -->
  <div id="committed-column-toggles" class="column-toggles"></div>
  <div id="committed-table" class="collapsible-section"></div>

  <!-- ===== Feature Sprint Timeline (Gantt) ===== -->
  <div class="section-header">
    <h2 class="pi-section-title">Feature Sprint Timeline (Gantt) <button class="collapse-btn pi-inline-collapse-btn" onclick="toggleTable('gantt-wrapper', this)">⬆ Collapse</button></h2>
  </div>

  <div id="gantt-wrapper" class="gantt-wrapper">
    <div id="gantt-container"></div>
  </div>

  <div class="section-header">
    <h2 class="pi-section-title">Story Sprint Planning <button class="collapse-btn pi-inline-collapse-btn" onclick="toggleTable('pi-story-planning-wrapper', this)">⬆ Collapse</button></h2>
  </div>
  <div id="pi-story-planning-wrapper" class="gantt-wrapper">
    <div id="pi-story-planning-meta" class="pi-story-planning-meta"></div>
    <div id="pi-story-table"></div>
  </div>

  <div id="pi-story-floating-actions" class="roadmap-floating-actions hidden">
    <span id="pi-story-pending-count" class="roadmap-counter roadmap-counter-pending">Pending story changes: 0</span>
    <button id="pi-story-push-jira" class="roadmap-push-btn" type="button">⬆ Push Story Changes</button>
  </div>

  <div id="pi-story-context-menu" class="roadmap-context-menu hidden"></div>

  <script src="/static/script.js"></script>

  <div id="unique-users-count" class="unique-users-counter"></div>
</body>
</html>
